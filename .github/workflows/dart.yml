name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      - run: pod repo update
        working-directory: ios

      - run: flutter build ios --release --no-codesign

      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 PrivyScintigloV1.ipa Payload
        working-directory: build/ios/iphoneos

      # Dynamically create a tag based on workflow run number
      - name: Create dynamic tag
        run: |
          TAG=v${{ github.run_number }}
          git config --global user.email "pratik.cemd@gmail.com"
          git config --global user.name "Pratik"
          git tag -fa $TAG -m "auto-created tag $TAG"
          git push origin $TAG --force
        shell: bash

      - name: Upload IPA to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/PrivyScintigloV1.ipa
          tag: v${{ github.run_number }}
          release-type: draft
          overwrite: true
          name: "PrivyScintiglo v${{ github.run_number }}"
          body: "new created delli7 add"
